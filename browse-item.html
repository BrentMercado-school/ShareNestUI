<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Items</title>
    <link rel="stylesheet" href="css/styel.css" />
</head>
<body>
    <h1>Browse Items</h1>

    <div class="category-buttons">
        <button class="category-btn active" data-category="all">All</button>
        <button class="category-btn" data-category="sports">Sports</button>
        <button class="category-btn" data-category="electronics">Electronics</button>
        <button class="category-btn" data-category="books">Books</button>
        <button class="category-btn" data-category="music">Music</button>
        <button class="category-btn" data-category="outdoor">Outdoor</button>
        <button class="category-btn" data-category="appliance">Appliance</button>
    </div>

    <h2 id="browse-title">All Items</h2>
    <p id="browse-description">Display all items shared by the community.</p>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Condition</th>
                <th>Security Deposit</th>
                <th>Note</th>
                <th>Borrowing Fee</th>
                <th>Status</th>
                <th>Owner</th>
                <th>Date</th>
                <th>Expected Return Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="browse-items"></tbody>
    </table>

    <br />
    <button onclick="window.location.href='dashboard.html'">Go Back</button>

    <script src="js/browse-item.js"></script>
</body>
</html>
