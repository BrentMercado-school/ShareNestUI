<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="layout">

        <aside class="sidebar">
            <a href="dashboard.html" class="logo">ShareNest</a>

            <nav>
                <a href="dashboard.html">
                    <i class="fa fa-home"></i> Home
                </a>
                <a href="my-items.html" class="active">
                    <i class="fa fa-box"></i> My Items
                </a>
                <a href="borrow-requests.html">
                    <i class="fa fa-file"></i> Requests
                </a>
                <a href="my-borrow-requests.html">
                    <i class="fa fa-file"></i> Your Requests
                </a>
                <a href="profile.html">
                    <i class="fa fa-user"></i> Profile
                </a>
            </nav>
        </aside>

        <main class="main">
            <div class="navbar">
                <div class="user">
                    <div id="my-items-avatar" class="avatar-circle"></div>
                    <div>
                        <p>Manage</p>
                        <h3 id="my-items-username">My Items</h3>
                    </div>
                </div>
            </div>

            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" id="my-items-search" placeholder="Search your items...">
            </div>

            <div class="categories">
                <button type="button" class="active" data-filter="all" onclick="setOwnedFilter('all')">All</button>
                <button type="button" data-filter="available" onclick="setOwnedFilter('available')">Available</button>
                <button type="button" data-filter="borrowed" onclick="setOwnedFilter('borrowed')">Borrowed</button>
                <button type="button" data-filter="latest" onclick="setOwnedFilter('latest')">Latest</button>
            </div>

            <p id="my-items-filter-note" class="filter-note">Filtered: All</p>

            <div class="section">
                <div id="my-items-list" class="my-items-list"></div>
            </div>
        </main>
    </div>

    <button id="open-add-item-modal" class="fab">
        <i class="fa fa-plus"></i>
    </button>

    <!-- ADD ITEM MODAL -->
    <div id="add-item-modal" class="modal">
        <div class="modal-content">
            <form id="add-item-form">
                <h2>Add Item</h2>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="item-name" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="item-category" required></select>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="item-description"></textarea>
                </div>

                <div class="form-group">
                    <label>Condition</label>
                    <input type="text" id="item-condition">
                </div>

                <div class="form-group">
                    <label>Image</label>
                    <input type="file" id="item-image" accept="image/*">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Deposit</label>
                        <input type="number" id="item-security-deposit">
                    </div>

                    <div class="form-group">
                        <label>Borrowing Fee</label>
                        <input type="number" id="item-borrowing-fee" value="50" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Note</label>
                    <textarea id="item-note"></textarea>
                </div>

                <div class="actions">
                    <button type="button" id="close-add-item-modal" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- EDIT ITEM MODAL -->
    <div id="edit-item-modal" class="modal">
        <div class="modal-content">
            <h2>Edit Item</h2>

            <form id="edit-item-form">
                <div class="form-group">
                    <label for="edit-item-name">Name</label>
                    <input type="text" id="edit-item-name" required>
                </div>

                <div class="form-group">
                    <label for="edit-item-category">Category</label>
                    <select id="edit-item-category">
                        <option value="">Select category</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edit-item-description">Description</label>
                    <textarea id="edit-item-description" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="edit-item-condition">Condition</label>
                    <input type="text" id="edit-item-condition">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-item-security-deposit">Deposit</label>
                        <input type="number" id="edit-item-security-deposit">
                    </div>
                    <div class="form-group">
                        <label for="edit-item-borrowing-fee">Borrowing Fee</label>
                        <input type="number" id="edit-item-borrowing-fee">
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-item-note">Note</label>
                    <textarea id="edit-item-note" rows="3"></textarea>
                </div>

                <div class="form-group" style="display:none;">
                    <select id="edit-item-status">
                        <option value="AVAILABLE">Available</option>
                        <option value="BORROWED">Borrowed</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" id="close-edit-item-modal" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast-message" class="toast-message">
        <div id="toast-icon" class="toast-icon">
            <i class="fa-solid fa-check"></i>
        </div>

        <div class="toast-text">
            <strong id="toast-title">Success</strong>
            <p id="toast-text">Item updated successfully.</p>
        </div>

        <button type="button" class="toast-close" onclick="hideToast()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <script src="js/my-items.js"></script>
    <script src="js/edit-item.js"></script>
    <script src="js/add-item.js"></script>
</body>
</html>
