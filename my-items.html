<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/styleddb.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">ShareNest</h2>

        <nav>
            <a href="dashboard.html">
                <i class="fa fa-home"></i> Home
            </a>
            <a href="my-items.html" class="active">
                <i class="fa fa-box"></i> My Items
            </a>
            <a href="borrow-requests.html">
                <i class="fa fa-file"></i> Requests
            </a>
            <a href="my-borrow-requests.html">
                <i class="fa fa-file"></i> Your Requests
            </a>
            <a href="profile.html">
                <i class="fa fa-user"></i> Profile
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- NAVBAR -->
         
        <div class="container">

            <div class="section">
                <h3>All Items</h3>
                <div class="grid" id="owned-items"></div>
            </div>

            <div class="section">
                <h3>Available</h3>
                <div class="grid" id="available-owned-items"></div>
            </div>

            <div class="section">
                <h3>Borrowed</h3>
                <div class="grid" id="my-borrowed-items"></div>
            </div>

        </div>

    </div>

</div>

<!-- FLOAT BUTTON -->
<button id="open-add-item-modal" class="fab">
    <i class="fa fa-plus"></i>
</button>


<div id="add-item-modal" class="modal">
    <div class="modal-content">

        <h2>Add Item</h2>

        <form id="add-item-form">
            <input type="text" id="item-name" placeholder="Name" required>
            <input type="text" id="item-description" placeholder="Description">
            <input type="text" id="item-condition" placeholder="Condition">
            <input type="number" id="item-security-deposit" placeholder="Deposit">
            <textarea id="item-note" placeholder="Note"></textarea>
            <input type="number" id="item-borrowing-fee" value="50" readonly>

            <div class="actions">
                <button type="button" id="close-add-item-modal">Cancel</button>
                <button type="submit">Save</button>
            </div>
        </form>

    </div>
</div>

<div id="edit-item-modal" class="modal">
    <div class="modal-content">

        <h2>Edit Item</h2>

        <form id="edit-item-form">

            <div class="form-group">
                <label for="edit-item-name">Name</label>
                <input type="text" id="edit-item-name" required>
            </div>

            <div class="form-group">
                <label for="edit-item-category">Category</label>
                <select id="edit-item-category">
                    <option value="">Select category</option>
                </select>
            </div>

            <div class="form-group">
                <label for="edit-item-description">Description</label>
                <textarea id="edit-item-description" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="edit-item-condition">Condition</label>
                <input type="text" id="edit-item-condition">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="edit-item-security-deposit">Deposit</label>
                    <input type="number" id="edit-item-security-deposit">
                </div>
                <div class="form-group">
                    <label for="edit-item-borrowing-fee">Borrowing Fee</label>
                    <input type="number" id="edit-item-borrowing-fee">
                </div>
            </div>

            <div class="form-group">
                <label for="edit-item-note">Note</label>
                <textarea id="edit-item-note" rows="3"></textarea>
            </div>

            <div class="form-group" style="display:none;">
                <select id="edit-item-status">
                    <option value="AVAILABLE">Available</option>
                    <option value="BORROWED">Borrowed</option>
                </select>
            </div>

            <div class="modal-actions">
                <button type="button" id="close-edit-item-modal" class="btn-cancel">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>

        </form>
    </div>
</div>  


<!-- KEEP YOUR EXISTING MODALS BELOW (NO CHANGE) -->
<script src="js/my-items.js"></script>
<script src="js/edit-item.js"></script>
<script src="js/add-item.js"></script>

</body>
</html>
