<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Items Page</title>
    <link rel="stylesheet" href="css/styel.css">
</head>
<body>
    <h1>My Items Page</h1>
    <h2>Items (all category):</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Condition</th>
                <th>Security Deposit</th>
                <th>Note</th>
                <th>Borrowing Fee</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="owned-items"></tbody>
    </table>

    <div id="return-item-modal" class="modal">
        <div class="modal-content">
            <h2>Return Item</h2>

            <p>
                <strong>Expected Return Date:</strong>
                <span id="expected-return-date-display">N/A</span>
            </p>

            <form id="return-item-form">
                <div class="form-group">
                    <label for="actual-return-date">Actual Return Date</label>
                    <input type="date" id="actual-return-date" required />
                </div>

                <div class="form-group">
                    <label for="damage-fee">Damage Fee</label>
                    <input type="number" id="damage-fee" step="0.01" value="0" required />
                </div>

                <div class="form-group">
                    <label for="late-penalty-fee">Late Penalty Fee</label>
                    <input type="number" id="late-penalty-fee" step="0.01" value="0.00" readonly />
                </div>

                <div class="form-group">
                    <label for="refund-amount">Refund Amount</label>
                    <input type="number" id="refund-amount" step="0.01" value="0.00" readonly />
                </div>

                <div class="actions">
                    <button type="button" id="close-return-item-modal">Cancel</button>
                    <button type="submit">Submit Return Form</button>
                </div>
            </form>
        </div>
    </div>

    <div id="edit-item-modal" class="modal">
        <div class="modal-content">
            <h2>Edit Item</h2>

            <form id="edit-item-form">
                <div class="form-group">
                    <label for="edit-item-name">Name</label>
                    <input type="text" id="edit-item-name" required />
                </div>

                <div class="form-group">
                    <label for="edit-item-category">Category</label>
                    <select id="edit-item-category" required>
                        <option value="">Select category</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edit-item-description">Description</label>
                    <textarea id="edit-item-description" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="edit-item-condition">Condition</label>
                    <input type="text" id="edit-item-condition" required />
                </div>

                <div class="form-group">
                    <label for="edit-item-security-deposit">Security Deposit</label>
                    <input type="number" id="edit-item-security-deposit" step="0.01" required />
                </div>

                <div class="form-group">
                    <label for="edit-item-note">Note</label>
                    <textarea id="edit-item-note" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="edit-item-borrowing-fee">Borrowing Fee</label>
                    <input type="number" id="edit-item-borrowing-fee" step="0.01" required />
                </div>

                <div class="form-group">
                    <label for="edit-item-status">Status</label>
                    <select id="edit-item-status" required>
                        <option value="AVAILABLE">AVAILABLE</option>
                        <option value="UNAVAILABLE">UNAVAILABLE</option>
                        <option value="BORROWED">BORROWED</option>
                    </select>
                </div>

                <div class="actions">
                    <button type="button" id="close-edit-item-modal">Cancel</button>
                    <button type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <button onclick="window.location.href='dashboard.html'">Go Back</button>

    <h2>Main Bar</h2>
    <button onclick="window.location.href='borrow-requests.html'">View Borrow Request</button>
    <button onclick="window.location.href='profile.html'">Profile</button>
    <button onclick="window.location.href='my-items.html'">My Items</button>
    <button onclick="window.location.href='add-item.html'">Add Item</button>

    <script src="js/my-items.js"></script>
</body>
</html>
