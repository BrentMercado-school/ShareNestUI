<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="login-card">
        <h1 class="logo">ShareNest</h1>

        <h2>Create your Account</h2>

        <form id="register-form">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter name" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <label>Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm password" required>

            <button type="submit">Sign Up</button>
        </form>

        <p class="register-text">
            Already have an account?
            <a href="login.html">Log in here</a>
        </p>
    </div>

</div>

<div id="toast-message" class="toast-message error">
    <div id="toast-icon" class="toast-icon">
        <i class="fa-solid fa-circle-exclamation"></i>
    </div>

    <div class="toast-text">
        <strong id="toast-title">Error</strong>
        <p id="toast-text">Something went wrong.</p>
    </div>

    <button type="button" class="toast-close" onclick="hideToast()">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>

<script src="js/register.js"></script>
</body>
</html>
