<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owned Item Details</title>
</head>
<body>
    <h1>Item Details</h1>

    <p><strong>Name:</strong> <span id="item-name"></span></p>
    <p><strong>Category:</strong> <span id="item-category"></span></p>
    <p><strong>Description:</strong> <span id="item-description"></span></p>
    <p><strong>Condition:</strong> <span id="item-condition"></span></p>
    <p><strong>Security Deposit:</strong> <span id="item-security-deposit"></span></p>
    <p><strong>Note:</strong> <span id="item-note"></span></p>
    <p><strong>Borrowing Fee:</strong> <span id="item-borrowing-fee"></span></p>
    <p><strong>Status:</strong> <span id="item-status"></span></p>
    <p><strong>Owner:</strong> <span id="item-owner"></span></p>
    <p><strong>Expected Return Date:</strong> <span id="item-expected-return-date"></span></p>

    <button onclick="window.location.href='dashboard.html'">Back</button>
    <button id="return-item-btn" style="display: none;">Return</button>

    <div id="return-item-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Return Item</h2>

            <p><strong>Expected Return Date:</strong> <span id="expected-return-date-display">N/A</span></p>

            <form id="return-item-form">
                <div class="form-group">
                    <label for="actual-return-date">Actual Return Date</label>
                    <input type="date" id="actual-return-date" required>
                </div>

                <div class="form-group">
                    <label for="damage-fee">Damage Fee</label>
                    <input type="number" id="damage-fee" step="0.01" value="0" required>
                </div>

                <div class="form-group">
                    <label for="late-penalty-fee">Late Penalty Fee</label>
                    <input type="number" id="late-penalty-fee" step="0.01" value="0.00" readonly>
                </div>

                <div class="form-group">
                    <label for="refund-amount">Refund Amount</label>
                    <input type="number" id="refund-amount" step="0.01" value="0.00" readonly>
                </div>

                <div class="actions">
                    <button type="button" id="close-return-item-modal">Cancel</button>
                    <button type="submit">Submit Return Form</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/owned-item-details.js"></script>
</body>
</html>
