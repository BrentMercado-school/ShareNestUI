<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details</title>

    <link rel="stylesheet" href="css/styleddb.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="layout">

     <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">ShareNest</h2>

        <nav>
            <a href="dashboard.html">
                <i class="fa fa-home"></i> Home
            </a>
            <a href="my-items.html"class="active">
                <i class="fa fa-box"></i> My Items
            </a>
            <a href="borrow-requests.html">
                <i class="fa fa-file"></i> Requests
            </a>
            <a href="profile.html">
                <i class="fa fa-user"></i> Profile
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- NAVBAR -->
        <div class="navbar">
            <h2>Item Details</h2>
            <div class="user">
                <div class="avatar">U</div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="container">

    <div class="details-card">

        <!-- IMAGE -->
        <div class="details-img"></div>

        <!-- INFO -->
        <div class="details-content">

            <h2 id="item-name">Item Name</h2>

            <div class="details-grid">

                <div><span>Category</span><p id="item-category"></p></div>
                <div><span>Condition</span><p id="item-condition"></p></div>
                <div><span>Deposit</span><p>₱<span id="item-security-deposit"></span></p></div>
                <div><span>Fee</span><p>₱<span id="item-borrowing-fee"></span></p></div>
                <div><span>Status</span><p id="item-status"></p></div>
                <div><span>Owner</span><p id="item-owner"></p></div>

            </div>

            <div class="details-section">
                <span>Description</span>
                <p id="item-description"></p>
            </div>

            <div class="details-section">
                <span>Note</span>
                <p id="item-note"></p>
            </div>

            <div class="details-section">
                <span>Return Date</span>
                <p id="item-expected-return-date"></p>
            </div>

            <div class="details-actions">
                <button onclick="window.location.href='my-items.html'" class="btn-secondary">Back</button>
                <button class="edit-item" onclick="handleEdit()">Edit Item</button>
                <button class="delete-btn" onclick="handleDelete()">Delete</button>
            </div>

        </div>

    </div>

</div>

<div id="edit-item-modal" class="modal">
    <div class="modal-content">

        <h2>Edit Item</h2>

        <form id="edit-item-form">
            <input type="hidden" id="edit-item-id">

            <input type="text" id="edit-item-name" placeholder="Name" required>

            <!-- ✅ ADDED: category dropdown -->
            <select id="edit-item-category">
                <option value="">Select category</option>
            </select>

            <input type="text" id="edit-item-description" placeholder="Description">
            <input type="text" id="edit-item-condition" placeholder="Condition">
            <input type="number" id="edit-item-security-deposit" placeholder="Deposit">

            <!-- ✅ ADDED: borrowing fee -->
            <input type="number" id="edit-item-borrowing-fee" placeholder="Borrowing Fee">

            <textarea id="edit-item-note" placeholder="Note"></textarea>

            <!-- ✅ ADDED: status -->
            <select id="edit-item-status">
                <option value="AVAILABLE">Available</option>
                <option value="BORROWED">Borrowed</option>
            </select>

            <div class="actions">
                <!-- ✅ FIXED: id changed to match edit-item.js -->
                <button type="button" id="close-edit-item-modal">Cancel</button>
                <button type="submit">Update</button>
            </div>
        </form>

    </div>
</div>

<script src="js/edit-item.js"></script>
<script src="js/owned-item-details.js"></script>


</body>
</html>
