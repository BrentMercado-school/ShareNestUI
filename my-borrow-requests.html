<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Borrow Requests</title>

    <link rel="stylesheet" href="css/styleddb.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>


<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">ShareNest</h2>

        <nav>
            <a href="dashboard.html">
                <i class="fa fa-home"></i> Home
            </a>
            <a href="my-items.html">
                <i class="fa fa-box"></i> My Items
            </a>
            <a href="borrow-requests.html">
                <i class="fa fa-file"></i> Requests
            </a>
            <a href="my-borrow-requests.html" class="active">
                <i class="fa fa-file"></i> Your Requests
            </a>
            <a href="profile.html">
                <i class="fa fa-user"></i> Profile
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="section">
            <h2>My Borrow Requests</h2>
        <div id="requests-container" class="card-grid"></div>

    </main>

</div>

<div id="confirm-modal" class="modal">
    <div class="modal-content" style="max-width: 380px;">
        <h2 id="confirm-title" style="font-size: 1.1rem; margin-bottom: 10px;">Are you sure?</h2>
        <p id="confirm-message" style="color: #6b7280; font-size: 0.9rem; margin-bottom: 24px;"></p>
        <div class="modal-actions">
            <button type="button" id="confirm-cancel-btn" class="btn-cancel">Cancel</button>
            <button type="button" id="confirm-ok-btn" class="btn-save">Confirm</button>
        </div>
    </div>
</div>

<script src="js/my-borrow-requests.js"></script>
</body>
</html>
