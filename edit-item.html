<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details</title>

    <link rel="stylesheet" href="css/styleddb.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="layout">

     <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">ShareNest</h2>

        <nav>
            <a href="dashboard.html" class="active">
                <i class="fa fa-home"></i> Home
            </a>
            <a href="my-items.html">
                <i class="fa fa-box"></i> My Items
            </a>
            <a href="borrow-requests.html">
                <i class="fa fa-file"></i> Requests
            </a>
            <a href="profile.html">
                <i class="fa fa-user"></i> Profile
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <h1>Edit Item</h1>

    <form id="edit-item-form">
        <div>
            <label for="edit-item-name">Name</label>
            <input type="text" id="edit-item-name" required>
        </div>

        <div>
            <label for="edit-item-category">Category</label>
            <select id="edit-item-category" required>
                <option value="">Select category</option>
            </select>
        </div>

        <div>
            <label for="edit-item-description">Description</label>
            <input type="text" id="edit-item-description" required>
        </div>

        <div>
            <label for="edit-item-condition">Condition</label>
            <input type="text" id="edit-item-condition" required>
        </div>

        <div>
            <label for="edit-item-security-deposit">Security Deposit</label>
            <input type="number" id="edit-item-security-deposit" required>
        </div>

        <div>
            <label for="edit-item-note">Note</label>
            <textarea id="edit-item-note"></textarea>
        </div>

        <div>
            <label for="edit-item-borrowing-fee">Borrowing Fee</label>
            <input type="number" id="edit-item-borrowing-fee" required>
        </div>

        <div>
            <label for="edit-item-status">Status</label>
            <select id="edit-item-status">
                <option value="AVAILABLE">AVAILABLE</option>
                <option value="BORROWED">BORROWED</option>
                <option value="UNAVAILABLE">UNAVAILABLE</option>
            </select>
        </div>

        <div style="margin-top: 12px;">
            <button type="button" onclick="window.location.href='my-items.html'">Cancel</button>
            <button type="submit">Update Item</button>
        </div>
    </form>


<!-- MODAL -->
<div id="borrow-modal" class="modal">
    <div class="modal-content">
        <h2>Borrow Item</h2>

        <form id="borrow-form">
            <label>Start Date</label>
            <input type="date" id="start-date" required>

            <label>Return Date</label>
            <input type="date" id="return-date" required>

            <div class="actions">
                <button type="button" id="close-borrow-modal">Cancel</button>
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>
</div>

<script src="js/item-details.js"></script>

</body>
</html>
