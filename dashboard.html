<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/styel.css">
</head>
<body>

    <button id="logout-btn">Logout</button>
    <button onclick="window.location.href='my-borrow-requests.html'">My Borrow Requests</button>
    <button onclick="window.location.href='my-borrowed-items.html'">My Borrowed Items</button>

    
    <button onclick="window.location.href='borrow-requests.html'">View Borrow Request</button>
    <button onclick="window.location.href='profile.html'">Profile</button>
    <button onclick="window.location.href='my-items.html'">My Items</button>
    <button id="open-add-item-modal">Add Item</button>
    <button onclick="window.location.href='dashboard.html'">Home</button>

    <hr>
    <button onclick="window.location.href='browse-item.html'">Browse Items</button>

    <h1>Dashboard</h1>
    <h2>Current User: </h2>
    <p id="username"></p>

    <h2 class="">All Items: </h2>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Condition</th>
                <th>Security Deposit</th>
                <th>Note</th>
                <th>Borrowing Fee</th>
                <th>Status</th>
                <th>Owner ID</th>
                <th>Actions</th>
                <th>Expected Return Date</th>
            </tr>
        </thead>
        <tbody id="items"></tbody>
    </table>


    <div id="add-item-modal" class="modal">
        <div class="modal-content">
            <h2>Add Item</h2>

            <form id="add-item-form">
                <div class="form-group">
                    <label for="item-name">Name</label>
                    <input type="text" id="item-name" required>
                </div>

                <div class="form-group">
                    <label for="item-category">Category</label>
                    <select id="item-category" required>
                        <option value="">Select category</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="item-description">Description</label>
                    <input type="text" id="item-description" required>
                </div>

                <div class="form-group">
                    <label for="item-condition">Condition</label>
                    <input type="text" id="item-condition" required>
                </div>

                <div class="form-group">
                    <label for="item-security-deposit">Security Deposit</label>
                    <input type="number" id="item-security-deposit" required>
                </div>

                <div class="form-group">
                    <label for="item-note">Note</label>
                    <textarea id="item-note"></textarea>
                </div>

                <div class="form-group">
                    <label for="item-borrowing-fee">Borrowing Fee</label>
                    <input type="number" id="item-borrowing-fee" required>
                </div>

                <div class="form-group">
                    <label for="item-status">Status</label>
                    <select id="item-status">
                        <option value="AVAILABLE">AVAILABLE</option>
                        <option value="BORROWED">BORROWED</option>
                    </select>
                </div>

                <div class="actions">
                    <button type="button" id="close-add-item-modal">Cancel</button>
                    <button type="submit">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <h2>Latest 5 Items</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Condition</th>
                <th>Security Deposit</th>
                <th>Note</th>
                <th>Borrowing Fee</th>
                <th>Status</th>
                <th>Owner</th>
                <th>Date Created</th>
                <th>Expected Return Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="latest-items"></tbody>
    </table>


    <script src="js/current-user.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/add-item.js"></script>
    <script src="js/edit-item.js"></script>
    <script src="js/delete-item.js"></script>
    <script src="js/return-item.js"></script>
</body>
</html>
