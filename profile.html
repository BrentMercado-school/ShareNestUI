<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>My Profile</h1>

    <button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
    <button id="open-edit-profile-modal">Edit Profile</button>

    <div>
        <p><strong>Name:</strong> <span id="profile-name">N/A</span></p>
        <p><strong>Email:</strong> <span id="profile-email">N/A</span></p>
        <p><strong>Address:</strong> <span id="profile-address">N/A</span></p>
        <p><strong>Contact Number:</strong> <span id="profile-contact-number">N/A</span></p>
        <p><strong>Image URL:</strong> <span id="profile-image-url">N/A</span></p>
    </div>

    <div id="edit-profile-modal" class="modal">
        <div class="modal-content">
            <h2>Edit Profile</h2>

            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="edit-profile-name">Name</label>
                    <input type="text" id="edit-profile-name" required>
                </div>

                <div class="form-group">
                    <label for="edit-profile-email">Email</label>
                    <input type="email" id="edit-profile-email" required>
                </div>

                <div class="form-group">
                    <label for="edit-profile-address">Address</label>
                    <input type="text" id="edit-profile-address">
                </div>

                <div class="form-group">
                    <label for="edit-profile-contact-number">Contact Number</label>
                    <input type="text" id="edit-profile-contact-number">
                </div>

                <div class="form-group">
                    <label for="edit-profile-image-url">Image URL</label>
                    <input type="text" id="edit-profile-image-url">
                </div>

                <div class="actions">
                    <button type="button" id="close-edit-profile-modal">Cancel</button>
                    <button type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
